name: Daily Data Automation

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

# This line clears the warning by forcing Node.js 24 runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Tracker Script
      run: python tracker.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add crypto_data.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily log: $(date +'%Y-%m-%d')" && git push)

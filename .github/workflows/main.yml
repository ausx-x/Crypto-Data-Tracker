name: Daily Data Automation

on:
  schedule:
    # This runs the script every day at 12:00 PM UTC (5:30 PM IST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to trigger it manually anytime with a button click

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the workflow permission to commit changes back to your repo

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Tracker Script
      run: python tracker.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add crypto_data.csv
        # Only commit if changes exist, avoiding workflow errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily log: $(date +'%Y-%m-%d')" && git push)
